services:
  postgres:
    image: postgres:16-alpine
    container_name: omnibot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnibot}
      POSTGRES_USER: ${POSTGRES_USER:-omnibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnibot_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnibot} -d ${POSTGRES_DB:-omnibot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibot-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "main.py"]

  activity-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibot-activity-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "activity.server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8008",
      ]

  activity-client:
    build:
      context: ./activity/client
      dockerfile: Dockerfile
      args:
        VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    container_name: omnibot-activity-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - activity-api

  ngrok:
    image: ngrok/ngrok:latest
    container_name: omnibot-ngrok
    restart: unless-stopped
    command:
      - http
      - activity-client:80
      - --log
      - stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - activity-client

volumes:
  postgres-data:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnibot-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnibot}
      POSTGRES_USER: ${POSTGRES_USER:-omnibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnibot} -d ${POSTGRES_DB:-omnibot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibot-migrate
    restart: "no"
    logging: *default-logging
    environment:
      OMNIBOT_SERVICE_NAME: migrate
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnibot}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-omnibot}
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/postgres_migrate.py"]

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibot-bot
    restart: unless-stopped
    logging: *default-logging
    environment:
      OMNIBOT_SERVICE_NAME: bot
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnibot}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-omnibot}
      DISCORD_PROXY_URL: ${DISCORD_PROXY_URL_DOCKER:-}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "main.py"]

  activity-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnibot-activity-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      OMNIBOT_SERVICE_NAME: activity_api
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnibot}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-omnibot}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "activity.server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8008",
        "--limit-concurrency",
        "200",
        "--timeout-keep-alive",
        "5",
      ]

  activity-client:
    build:
      context: ./activity/client
      dockerfile: Dockerfile
      args:
        VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    container_name: omnibot-activity-client
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      - activity-api

  ngrok:
    image: ngrok/ngrok:latest
    container_name: omnibot-ngrok
    restart: unless-stopped
    logging: *default-logging
    command:
      - http
      - activity-client:8080
      - --log
      - stdout
      - --inspect=false
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      - activity-client

volumes:
  postgres-data:
